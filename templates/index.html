<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Deepfake Detector</h1>
        <p class="subtitle">Upload an image or video to analyse.</p>

        <form action="/predict" method="post" enctype="multipart/form-data">
            <label class="file-label" for="file">Choose file</label>
            <input type="file" id="file" name="file"
                   accept="image/*,video/mp4,video/avi,video/quicktime,video/x-matroska">
            <span id="file-name" class="file-name">No file selected</span>
            <button type="submit">Analyse</button>
        </form>

        {% if result %}
        <div class="result {{ result | lower }}">
            <h2>{{ result }}</h2>
            <p>Confidence: <strong>{{ confidence }}%</strong></p>
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('file').addEventListener('change', function () {
            var name = this.files.length ? this.files[0].name : 'No file selected';
            document.getElementById('file-name').textContent = name;
        });
    </script>
</body>
</html>
